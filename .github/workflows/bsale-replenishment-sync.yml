name: Bsale Replenishment Sync

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bsale-replenishment-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger protected sync endpoint
        env:
          SYNC_URL: ${{ secrets.PRODUCTION_SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail

          if [ -z "$SYNC_URL" ]; then
            echo "Missing PRODUCTION_SYNC_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET"
            exit 1
          fi

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            response_file="$(mktemp)"
            started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[$started_at] Sync attempt $attempt/$max_attempts"

            curl_exit=0
            http_code="$(curl -sS -X POST "$SYNC_URL" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 600 \
              -o "$response_file" \
              -w "%{http_code}" || curl_exit=$?)"
            body="$(cat "$response_file")"
            rm -f "$response_file"
            echo "HTTP status: ${http_code:-000} · curl exit: $curl_exit"
            echo "Response: ${body:0:2000}"

            if [ "$http_code" = "200" ]; then
              echo "Sync completed."
              exit 0
            fi
            if [ "$http_code" = "409" ] && echo "$body" | grep -q 'SKIPPED_LOCKED'; then
              echo "Sync skipped: another sync is already running."
              exit 0
            fi
            if [ "$http_code" = "401" ]; then
              echo "Unauthorized: check CRON_SECRET / endpoint auth."
              exit 1
            fi

            if [ "$attempt" -lt "$max_attempts" ] && { [ "$http_code" = "000" ] || [ "$curl_exit" -ne 0 ] || [[ "$http_code" =~ ^5 ]]; }; then
              echo "Retrying in 30 seconds..."
              sleep 30
              continue
            fi

            echo "Sync endpoint failed."
            exit 1
          done
